<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Bar Charts Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 {
            margin-top: 0;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: -webkit-linear-gradient(#fff, #a1c4fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            color: #e0e0e0;
            margin-bottom: 40px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .card-link {
            text-decoration: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-link:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(118, 75, 162, 0.5);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .icon {
            margin-right: 10px;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Chart Dashboard</h1>
        <p>Select a visualization to view the animated data.</p>
        
        <div class="links-grid">
            <a href="barchart.html" class="card-link">
                <span class="icon">📊</span> Vertical Bar Chart
            </a>
            <a href="horizontal_bar.html" class="card-link">
                <span class="icon">📈</span> Horizontal Bar Chart
            </a>
        </div>
    </div>

</body>
</html>
